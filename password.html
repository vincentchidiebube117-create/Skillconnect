<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="password.css">
    <title>Recover Password</title>
</head>

    <div class="card">
        <h3>Recover Access</h3>

        <a href="auth.html" class="back-link">Back to Login</a>
    </div>

    <script type="module" src="password.js"></script>
</body>
</html>
