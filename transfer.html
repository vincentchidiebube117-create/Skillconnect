<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Connect - Wallet Transfer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="transfer.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <span class="logo-title">SKILL</span>
                <span class="logo-accent">CONNECT</span>
            </div>

            <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
                <i class="fa-solid fa-bars"></i>
            </button>

            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="withdrawal.html" class="nav-link">Withdraw</a>
                <a href="transfer.html" class="nav-link active">Transfer Funds</a>
                <button type="button" class="logout-link-btn" id="logoutBtn">Logout</button>
            </nav>
        </div>
    </header>

    <main class="transfer-workspace">
        <div class="transfer-card">
            <h2 class="card-title"><i class="fa-solid fa-money-bill-transfer"></i> Peer-to-Peer Wallet Transfer</h2>
            <p class="card-subtitle">Move funds instantly from your wallet balance to another Skill Connect member. Transfers are processed immediately.</p>

            <div class="balance-display-box">
                <span class="bal-label">Your Wallet Balance:</span>
                <span class="bal-amount" id="lblWalletBalance">₦0.00</span>
            </div>

            <form id="walletTransferForm">
                
                <div class="form-group">
                    <label for="recipientUsername">Recipient Username</label>
                    <div class="input-lookup-group">
                        <span class="input-prefix">@</span>
                        <input type="text" id="recipientUsername" class="form-control" placeholder="Enter recipient's username" required>
                        <button type="button" id="btnVerifyRecipient" class="btn-lookup">Verify</button>
                    </div>
                </div>

                <div id="verificationFeedback" class="feedback-box hidden-element">
                    <i class="fa-solid fa-user-check"></i> Recipient Found: <strong id="lblRecipientFullName">---</strong>
                </div>

                <div id="securedTransferFields" class="disabled-section">
                    <div class="form-group">
                        <label for="transferAmount">Amount to Transfer (₦)</label>
                        <input type="number" id="transferAmount" class="form-control" placeholder="Enter amount to send" min="1" required disabled>
                    </div>

                    <div class="form-group">
                        <label for="senderWalletPassword">Your Wallet Password</label>
                        <input type="password" id="senderWalletPassword" class="form-control" placeholder="Enter your wallet security password" required disabled>
                    </div>

                    <button type="submit" id="btnExecuteTransfer" class="btn-submit-transfer" disabled>Authorize & Send Funds</button>
                </div>

            </form>
        </div>
    </main>

    <script type="module" src="transfer.js"></script>
</body>
</html>
